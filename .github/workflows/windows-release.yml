name: Build peterMath Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Windows x64 release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release
        run: cargo build --release

      - name: Generate preview images
        run: cargo run --bin render_preview

      - name: Prepare native-first judge package
        run: python scripts/package_submission.py --exe target/release/peterMath.exe --out dist/peterMath_windows_submission

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: peterMath-windows-x64
          path: dist\peterMath_windows_submission
